

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lens Catalog Manager - Sony Lens Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Lens Manager Specific Styles */
        .lens-manager-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e9ecef;
        }

        .lens-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .lens-catalog-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .lens-catalog-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .lens-card-image {
            height: 200px;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .lens-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .lens-card-image .no-image {
            text-align: center;
            color: #bdc3c7;
        }

        .lens-card-image .no-image i {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .lens-card-info {
            padding: 20px;
        }

        .lens-card-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .lens-card-specs {
            color: #7f8c8d;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .lens-card-specs span {
            display: inline-block;
            background: #f0f4ff;
            padding: 4px 8px;
            border-radius: 5px;
            margin-right: 8px;
            font-size: 0.85em;
        }

        .lens-card-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e9ecef;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            max-width: 800px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e9ecef;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1em;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .image-preview {
            max-width: 200px;
            max-height: 200px;
            margin-top: 10px;
            border-radius: 8px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
        }

        .search-bar {
            margin-bottom: 20px;
        }

        .search-bar input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1em;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
        }

        .status-active {
            background: #d4edda;
            color: #155724;
        }

        .status-inactive {
            background: #f8d7da;
            color: #721c24;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #bdc3c7;
        }
    </style>
</head>

<script>
    // Check if we're in an iframe (modal mode)
    if (window.self !== window.top) {
        // We're in an iframe - hide the back button and adjust layout
        document.addEventListener('DOMContentLoaded', function() {
            const backButton = document.querySelector('.header-bar .btn-secondary');
            if (backButton && backButton.textContent.includes('Back to Main App')) {
                backButton.style.display = 'none';
            }
            
            // Add a close button to the lens manager header
            const headerBar = document.querySelector('.header-bar');
            if (headerBar) {
                const closeBtn = document.createElement('button');
                closeBtn.className = 'btn btn-secondary';
                closeBtn.style.marginLeft = 'auto';
                closeBtn.style.background = 'rgba(255,255,255,0.2)';
                closeBtn.style.border = 'none';
                closeBtn.innerHTML = '<i class="fas fa-times"></i> Close';
                closeBtn.onclick = function() {
                    window.parent.postMessage({ type: 'CLOSE_LENS_MANAGER' }, '*');
                };
                headerBar.appendChild(closeBtn);
            }
        });
    }
    
    // Notify parent when lenses are added/updated/deleted
    const originalFetch = window.fetch;
    window.fetch = function(...args) {
        return originalFetch.apply(this, args).then(async (response) => {
            const url = args[0];
            const clonedResponse = response.clone();
            const data = await clonedResponse.json().catch(() => null);
            
            // Check if this is a lens modification operation
            if (typeof url === 'string') {
                if (url.includes('/api/lenses') && 
                    (args[1]?.method === 'POST' || args[1]?.method === 'PUT' || args[1]?.method === 'DELETE')) {
                    if (data && data.success) {
                        // Notify parent that lenses were modified
                        window.parent.postMessage({ 
                            type: 'LENSES_UPDATED', 
                            action: args[1]?.method,
                            lens: data.lens 
                        }, '*');
                    }
                }
            }
            
            return response;
        });
    };
</script>

<body>
    <div class="lens-manager-container">
        <div class="header-bar">
            <div>
                <h1><i class="fas fa-sliders-h"></i> Lens Catalog Manager</h1>
                <p>Manage your lens collection with photos and specifications</p>
            </div>
            <div>
                <a href="/" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Back to Main App
                </a>
                <button onclick="openLensModal()" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Add New Lens
                </button>
            </div>
        </div>

        <div class="search-bar">
            <input type="text" id="searchLenses" placeholder="Search lenses by name, manufacturer, or focal length...">
        </div>

        <div id="lensGrid" class="lens-grid">
            <!-- Lenses will be loaded here -->
        </div>
    </div>

    <!-- Modal for Add/Edit Lens -->
    <div id="lensModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Lens</h2>
                <button onclick="closeModal()"
                    style="background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
            </div>
            <form id="lensForm">
                <input type="hidden" id="lensId">

                <div class="form-group">
                    <label for="lensImage">Lens Photo</label>
                    <input type="file" id="lensImage" accept="image/*">
                    <div id="imagePreview"></div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="lensName">Lens Name *</label>
                        <input type="text" id="lensName" required placeholder="e.g., Sony FE 35mm F1.4 GM">
                    </div>
                    <div class="form-group">
                        <label for="lensMaker">Manufacturer *</label>
                        <input type="text" id="lensMaker" required placeholder="e.g., Sony, Zeiss, Canon">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="lensType">Lens Type *</label>
                        <select id="lensType">
                            <option value="prime">Prime (Fixed Focal Length)</option>
                            <option value="zoom">Zoom (Variable Focal Length)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="lensAperture">Aperture *</label>
                        <input type="text" id="lensAperture" required placeholder="e.g., F1.4 or F2.8-4">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="focalLengthDisplay">Focal Length Display *</label>
                        <input type="text" id="focalLengthDisplay" required placeholder="e.g., 35mm or 24-70mm">
                    </div>
                </div>

                <div id="fixedFocalGroup" class="form-group">
                    <label for="fixedFocalLength">Fixed Focal Length (for prime) *</label>
                    <input type="number" id="fixedFocalLength" step="1" placeholder="35">
                </div>

                <div id="zoomFocalGroup" class="form-group" style="display: none;">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="minFocalLength">Min Focal Length *</label>
                            <input type="number" id="minFocalLength" step="1" placeholder="24">
                        </div>
                        <div class="form-group">
                            <label for="maxFocalLength">Max Focal Length *</label>
                            <input type="number" id="maxFocalLength" step="1" placeholder="70">
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="minFocalLength">Min Focal Length (for zoom)</label>
                        <input type="number" id="minFocalLength" placeholder="24">
                    </div>
                    <div class="form-group">
                        <label for="maxFocalLength">Max Focal Length (for zoom)</label>
                        <input type="number" id="maxFocalLength" placeholder="70">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="minAperture">Minimum Aperture (F-number) *</label>
                        <input type="number" step="0.1" id="minAperture" required placeholder="1.4">
                    </div>
                    <div class="form-group">
                        <label for="exifLensID">EXIF Lens ID *</label>
                        <input type="text" id="exifLensID" required placeholder="e.g., Model 1">
                    </div>
                </div>

                <div class="form-group">
                    <label for="exifLensModel">EXIF Lens Model *</label>
                    <input type="text" id="exifLensModel" required placeholder="e.g., FE 35mm F1.4 GM">
                </div>

                <div class="form-group">
                    <label for="lensDescription">Description</label>
                    <textarea id="lensDescription" rows="3" placeholder="Notes about this lens..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="isManual"> This is a manual/vintage lens
                        </label>
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="isActive" checked> Active (shown in main app)
                        </label>
                    </div>
                </div>

                <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                    <button type="button" onclick="closeModal()" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Lens</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/lens-manager.js"></script>
</body>

</html>
